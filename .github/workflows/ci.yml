name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Web UI
        run: |
          cd web
          npm install --legacy-peer-deps
          npm run build

      - name: Build Go binary
        run: CGO_ENABLED=0 go build -ldflags "-s -w" -o ogcode .

      - name: Run tests
        run: go test ./...
