name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINGET_PKGS_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}

      - name: Create Winget PR to microsoft/winget-pkgs
        if: success()
        env:
          GH_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BRANCH="ogcode-${GITHUB_REF_NAME}"

          # Create PR from the branch GoReleaser pushed to
          gh pr create \
            --repo microsoft/winget-pkgs \
            --title "New version: prasenjeet-symon.ogcode version ${VERSION}" \
            --body "Automated PR created by GoReleaser for ogcode v${VERSION}." \
            --head "prasenjeet-symon:${BRANCH}" \
            --base master
