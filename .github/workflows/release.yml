name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINGET_PKGS_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}

      - name: Create Winget PR to microsoft/winget-pkgs
        if: success()
        env:
          GH_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          BRANCH="ogcode-v${VERSION}"
          FORK_OWNER="prasenjeet-symon"
          
          echo "Processing winget release for v${VERSION}..."
          
          # Check if PR already exists
          EXISTING_PR=$(gh pr list \
            --repo microsoft/winget-pkgs \
            --head "${FORK_OWNER}:${BRANCH}" \
            --base master \
            --state all \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")
          
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #${EXISTING_PR} already exists for branch ${BRANCH}. Checking status..."
            PR_STATE=$(gh pr view "${EXISTING_PR}" --repo microsoft/winget-pkgs --json state --jq '.state')
            if [ "$PR_STATE" = "merged" ]; then
              echo "PR was already merged - version ${VERSION} is already in winget-pkgs"
              exit 0
            elif [ "$PR_STATE" = "closed" ]; then
              echo "PR was closed - recreating with force push..."
              # Re-create branch from current master
              git fetch upstream master
              git checkout -B "${BRANCH}" upstream/master
              git push "${FORK_OWNER}" "${BRANCH}" --force
            else
              echo "PR #${EXISTING_PR} is still open - no action needed"
              exit 0
            fi
          else
            # Verify branch exists in fork, create if not
            if ! git ls-remote --heads "https://github.com/${FORK_OWNER}/winget-pkgs.git" "${BRANCH}" | grep -q "${BRANCH}"; then
              echo "Branch ${BRANCH} does not exist in fork. This may indicate GoReleaser didn't push."
              echo "The winget-pkgs manifest may need to be created manually or GoReleaser config needs adjustment."
              exit 1
            fi
          fi
          
          # Create PR
          echo "Creating PR for ogcode v${VERSION}..."
          gh pr create \
            --repo microsoft/winget-pkgs \
            --title "[ogcode] New version: prasenjeet-symon.ogcode version ${VERSION}" \
            --body "Automated PR created by GoReleaser for ogcode v${VERSION}.

This PR updates the winget manifest for ogcode CLI tool.

---
_This PR was automatically generated._" \
            --head "${FORK_OWNER}:${BRANCH}" \
            --base master \
            --label "manifest" || {
              # If create fails, check if it's due to no new commits
              if gh api repos/microsoft/winget-pkgs/compare/master..."${FORK_OWNER}:${BRANCH}" --jq '.behind_by' 2>/dev/null | grep -q "0"; then
                echo "No new commits - PR may already be up to date"
                exit 0
              fi
              echo "Failed to create PR - winget-pkgs may need manual intervention"
              exit 1
            }
          
          echo "✓ Winget PR created successfully!"
