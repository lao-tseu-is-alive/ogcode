name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINGET_PKGS_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}

      - name: Create Winget PR to microsoft/winget-pkgs
        if: success()
        env:
          GH_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BRANCH="prasenjeet-symon-ogcode-${VERSION}"
          REPO="https://github.com/prasenjeet-symon/winget-pkgs"

          # Make gh CLI available and configure git to use it for auth
          gh auth setup-git

          # Clone the fork (GoReleaser already committed manifests into it)
          git clone --depth 1 "${REPO}" winget-pkgs-work
          cd winget-pkgs-work

          # Configure git
          git config user.name "prasenjeet-symon"
          git config user.email "prasenjeet-symon@users.noreply.github.com"

          # Create a new branch from the updated main (GoReleaser pushed manifests here)
          git checkout -b "${BRANCH}"

          # Commit and push (authenticated via gh credential helper)
          git add .
          git diff --cached --quiet || git commit -m "Update prasenjeet-symon.ogcode to ${VERSION}"
          git push origin "${BRANCH}" --force

          # Create PR via GitHub CLI
          gh pr create \
            --repo microsoft/winget-pkgs \
            --title "New version: prasenjeet-symon.ogcode version ${VERSION}" \
            --body "Automated PR created by GoReleaser for ogcode v${VERSION}." \
            --head "prasenjeet-symon:${BRANCH}" \
            --base master
