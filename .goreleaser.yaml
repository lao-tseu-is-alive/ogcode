# GoReleaser configuration for ogcode
# See: https://goreleaser.com

version: 2

project_name: ogcode

before:
  hooks:
    # Build the web UI assets before compiling Go
    - bash -c 'cd web && npm install --legacy-peer-deps --cache /tmp/npm-cache && npm run build'
    - go mod tidy
    - go mod verify

builds:
  - id: ogcode
    main: .
    binary: ogcode
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    goarm:
      - "7"
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/prasenjeet-symon/ogcode/internal/cli.version={{.Version}}
      - -X github.com/prasenjeet-symon/ogcode/internal/cli.commit={{.Commit}}
      - -X github.com/prasenjeet-symon/ogcode/internal/cli.date={{.Date}}

archives:
  - id: ogcode
    ids:
      - ogcode
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE*
      - README*

winget:
  - name: ogcode
    publisher: prasenjeet-symon
    license: MIT
    license_url: "https://github.com/prasenjeet-symon/ogcode/blob/main/LICENSE"
    short_description: "Agentic coding assistant with web UI"
    description: "ogcode is an agentic coding assistant with a web UI that helps you write, review, and manage code."
    homepage: "https://github.com/prasenjeet-symon/ogcode"
    publisher_url: "https://github.com/prasenjeet-symon"
    repository:
      owner: prasenjeet-symon
      name: ogcode
      branch: main
      token: "{{ .Env.GITHUB_TOKEN }}"
    commit_author:
      name: Prasenjeet Symon
      email: prasenjeet-symon@users.noreply.github.com
    commit_msg_template: "{{ .PackageIdentifier }} {{ .Version }}"
    path: manifests/p/prasenjeet-symon/ogcode
    ids:
      - ogcode

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: prasenjeet-symon
    name: ogcode
  draft: false
  prerelease: auto

# GitHub Actions will need GITHUB_TOKEN, so we don't need goreleaser pro
# For signing (optional), you can enable later
