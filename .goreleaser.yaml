# GoReleaser configuration for ogcode
# See: https://goreleaser.com

version: 2

project_name: ogcode

# No `before` hooks: binaries (with the embedded web UI) are built natively
# per-platform in the release workflow before GoReleaser runs. See release.yml.

builds:
  - id: ogcode
    main: .
    binary: ogcode
    # ogcode links github.com/gen2brain/go-fitz, which only statically links
    # libmupdf (no runtime libmupdf.* dependency) when built with CGO_ENABLED=1
    # against the target platform's C toolchain. Reliable CGO cross-compilation
    # of that C codebase from one runner is impractical and GoReleaser OSS has no
    # `prebuilt` builder, so the release workflow builds each target natively and
    # this gobinary shim makes GoReleaser package those prebuilt binaries while
    # still producing archives, checksums, the Homebrew formula and the winget
    # manifest. Version/commit/date are injected during the native build.
    tool: ./tools/gobuild-shim.sh
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=1

archives:
  - id: ogcode
    ids:
      - ogcode
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE*
      - README*
      # Web-search bridge. `strip_parent` keeps only the basenames so both files
      # land in a real `search-bridge/` directory inside the archive
      # (search-bridge/server.js + search-bridge/package.json). Without it, both
      # entries collapse onto a single file named `search-bridge`.
      - src: tools/search-bridge/server.js
        dst: search-bridge
        strip_parent: true
      - src: tools/search-bridge/package.json
        dst: search-bridge
        strip_parent: true

winget:
  - name: ogcode
    # Don't push a winget manifest for prereleases (e.g. -rc/-beta tags).
    skip_upload: "auto"
    publisher: prasenjeet-symon
    license: MIT
    license_url: "https://github.com/prasenjeet-symon/ogcode/blob/main/LICENSE"
    short_description: "Agentic coding assistant with web UI"
    description: "ogcode is an agentic coding assistant with a web UI that helps you write, review, and manage code."
    homepage: "https://github.com/prasenjeet-symon/ogcode"
    publisher_url: "https://github.com/prasenjeet-symon"
    repository:
      owner: prasenjeet-symon
      name: winget-pkgs
      branch: "{{ .ProjectName }}-{{ .Version }}"
      token: "{{ .Env.WINGET_PKGS_TOKEN }}"
    commit_author:
      name: Prasenjeet Symon
      email: prasenjeet-symon@users.noreply.github.com
    commit_msg_template: "{{ .PackageIdentifier }} {{ .Version }}"
    path: manifests/p/prasenjeet-symon/ogcode/{{.Version}}
    ids:
      - ogcode
    tags:
      - ogcode
      - coding-assistant
    publisher_support_url: "https://github.com/prasenjeet-symon/ogcode/issues"
    release_notes_url: "https://github.com/prasenjeet-symon/ogcode/releases/tag/{{.Tag}}"

brews:
  - name: ogcode
    # Don't update the Homebrew tap for prereleases (e.g. -rc/-beta tags).
    skip_upload: "auto"
    repository:
      owner: prasenjeet-symon
      name: homebrew-tap
      branch: main
      token: "{{ .Env.WINGET_PKGS_TOKEN }}"
    commit_author:
      name: Prasenjeet Symon
      email: prasenjeet-symon@users.noreply.github.com
    commit_msg_template: "ogcode {{ .Version }}"
    directory: Formula
    homepage: "https://github.com/prasenjeet-symon/ogcode"
    description: "Agentic coding assistant with web UI"
    license: MIT
    test: |
      system "#{bin}/ogcode", "--help"
    caveats: |
      ogcode installed! Run `ogcode --help` to get started.

      Web Search Agent (optional):
        Requires Node.js. To enable after install:
          cd #{HOMEBREW_PREFIX}/share/ogcode/search-bridge
          npm install
          npx playwright install chromium
        Then enable search in ogcode Settings → General.
    install: |
      bin.install "ogcode"
      (share/"ogcode/search-bridge").mkpath
      (share/"ogcode/search-bridge").install "search-bridge/server.js"
      (share/"ogcode/search-bridge").install "search-bridge/package.json"
    post_install: |
      bridge_dir = share/"ogcode/search-bridge"
      if which("node") && which("npm")
        system "npm", "install", "--legacy-peer-deps", "--prefix", bridge_dir.to_s, "--silent"
        system "npx", "playwright", "install", "chromium"
        ohai "Web search agent ready. Enable it in ogcode Settings → General."
      end

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: prasenjeet-symon
    name: ogcode
  draft: false
  prerelease: auto

# GitHub Actions will need GITHUB_TOKEN, so we don't need goreleaser pro
# For signing (optional), you can enable later
